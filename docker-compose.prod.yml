services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gochito_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4555:4000"
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: "4000"
      API_PREFIX: /api/v1
      CORS_ORIGINS: ${APP_URL:-http://localhost}
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_TIMEZONE: "-04:00"
      DB_CONNECTION_LIMIT: "10"
      TZ: America/Caracas
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: "12"
    volumes:
      - gochito_uploads:/app/uploads
    networks:
      - interna

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gochito_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5766}:80"
    depends_on:
      - backend
    networks:
      - interna

volumes:
  gochito_uploads:
    name: gochito_uploads

networks:
  interna:
    name: gochito_interna
