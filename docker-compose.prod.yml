services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gochito_backend
    restart: unless-stopped
    ports:
      - "4555:4000"
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: "4000"
      API_PREFIX: /api/v1
      CORS_ORIGINS: ${APP_URL:-http://localhost}
      # Base de datos EXTERNA (proveedor gestionado). Usa DATABASE_URL con la
      # cadena de conexion completa, o las DB_* discretas. DATABASE_URL manda.
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_TIMEZONE: "-04:00"
      DB_CONNECTION_LIMIT: "10"
      # SSL: los proveedores externos casi siempre lo exigen.
      DB_SSL: ${DB_SSL:-true}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-false}
      TZ: America/Caracas
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: "12"
      # Tasa BCV (Cotizave por defecto). Solo la key es obligatoria; URL/header opcionales.
      TASA_BCV_API_KEY: ${TASA_BCV_API_KEY:-}
      TASA_BCV_URL: ${TASA_BCV_URL:-https://api.cotizave.com/v1/fx/rates/reference}
      TASA_BCV_AUTH_HEADER: ${TASA_BCV_AUTH_HEADER:-X-API-Key}
      # Migraciones: ahora las gestiona Prisma (el contenedor corre `prisma migrate
      # deploy` al arrancar, ver Dockerfile). El migrador SQL propio queda apagado.
      EJECUTAR_MIGRACIONES: "false"
    volumes:
      - gochito_uploads:/app/uploads
    networks:
      - interna

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gochito_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5766}:80"
    depends_on:
      - backend
    networks:
      - interna

volumes:
  gochito_uploads:
    name: gochito_uploads

networks:
  interna:
    name: gochito_interna
