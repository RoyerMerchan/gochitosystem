# =============================================================================
# GochitoSystem — despliegue completo en un VPS con Docker.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.produccion up -d --build
#
# Levanta 3 servicios conectados en una red privada:
#   mariadb  -> base de datos (volumen persistente; carga schema+seed la 1a vez)
#   backend  -> API Node/Express (no expone puerto al exterior; solo la ve nginx)
#   web      -> nginx: sirve la app React y proxea /api al backend (mismo dominio)
#
# Solo el servicio "web" se publica al exterior (puerto WEB_PORT).
# =============================================================================

services:
  mariadb:
    image: mariadb:11.4
    container_name: gochito_mariadb
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=-04:00
      - --innodb-buffer-pool-size=512M
      - --log-bin=binlog
      - --binlog-format=ROW
      - --expire-logs-days=7
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: America/Caracas
    volumes:
      - gochito_db_data:/var/lib/mysql
      # Se cargan SOLO la primera vez que se crea el volumen, en orden alfabetico.
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - interna

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gochito_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: "4000"
      API_PREFIX: /api/v1
      # El frontend llama a /api desde el mismo dominio, asi que basta con localhost.
      CORS_ORIGINS: ${APP_URL:-http://localhost}
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_TIMEZONE: "-04:00"
      DB_CONNECTION_LIMIT: "10"
      TZ: America/Caracas
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: "12"
    volumes:
      - gochito_uploads:/app/uploads
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - interna

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gochito_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - interna

volumes:
  gochito_db_data:
    name: gochito_db_data
  gochito_uploads:
    name: gochito_uploads

networks:
  interna:
    name: gochito_interna
