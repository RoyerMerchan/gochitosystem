services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gochito_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4555:4000"
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: "4000"
      API_PREFIX: /api/v1
      CORS_ORIGINS: ${APP_URL:-http://localhost}
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_TIMEZONE: "-04:00"
      DB_CONNECTION_LIMIT: "10"
      TZ: America/Caracas
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
      BCRYPT_ROUNDS: "12"
      # Tasa BCV (Cotizave por defecto). Solo la key es obligatoria; URL/header opcionales.
      TASA_BCV_API_KEY: ${TASA_BCV_API_KEY:-}
      TASA_BCV_URL: ${TASA_BCV_URL:-https://api.cotizave.com/v1/fx/rates/reference}
      TASA_BCV_AUTH_HEADER: ${TASA_BCV_AUTH_HEADER:-X-API-Key}
      # Migraciones automáticas al arrancar (aplica las pendientes de /app/migraciones).
      EJECUTAR_MIGRACIONES: "true"
      MIGRACIONES_DIR: /app/migraciones
    volumes:
      - gochito_uploads:/app/uploads
      # Monta las migraciones del repo (solo lectura) para que el backend las aplique al arrancar.
      - ./database/migraciones:/app/migraciones:ro
    networks:
      - interna

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gochito_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5766}:80"
    depends_on:
      - backend
    networks:
      - interna

volumes:
  gochito_uploads:
    name: gochito_uploads

networks:
  interna:
    name: gochito_interna
