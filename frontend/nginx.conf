# nginx del frontend: sirve la SPA y proxea /api al backend (mismo dominio, sin CORS).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Límite de subida (logo, imágenes).
    client_max_body_size 6m;

    # Archivos estáticos con cache largo.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Las llamadas a la API van al backend (servicio "backend" del compose).
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket de tiempo real (Socket.IO): requiere upgrade de conexion.
    location /socket.io/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sin timeout corto: la conexion es de larga vida.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA: cualquier ruta desconocida devuelve index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
