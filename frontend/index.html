<!doctype html>
<html lang="es-VE">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="description" content="Mini Market Los Gochitos — punto de venta, inventario y creditos" />
    <title>Los Gochitos — POS</title>
    <script>
      // Aplica el tema guardado antes del primer pintado para evitar el parpadeo blanco.
      (function () {
        try {
          var crudo = localStorage.getItem('gochito.ui');
          var tema = crudo ? JSON.parse(crudo).state.tema : 'sistema';
          var oscuro =
            tema === 'oscuro' ||
            (tema === 'sistema' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', oscuro);
        } catch (e) {
          /* sin tema guardado: se usa el claro */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
